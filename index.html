<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Secret Pourim 🎭</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Poppins:wght@300;400;600&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --bg-main: #14021f;
      --bg-deep: #22043a;
      --purple: #a855f7;
      --pink: #ec4899;
      --gold: #fbbf24;
      --white-soft: #fdf4ff;
      --card-bg: rgba(30, 6, 50, 0.95);
      --error: #f87171;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at 20% 10%, rgba(236, 72, 153, 0.3), transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.3), transparent 40%),
        linear-gradient(160deg, var(--bg-main), var(--bg-deep));
      font-family: "Poppins", sans-serif;
      color: var(--white-soft);
      padding: 16px;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(145deg, #2a0b45, #3b0764);
      border-radius: 26px;
      padding: 24px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .title {
      font-family: "Comfortaa", sans-serif;
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(236, 72, 153, 0.7);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.9rem;
      opacity: 0.9;
      margin-bottom: 18px;
    }

    .mask-emoji {
      font-size: 2rem;
      margin-bottom: 10px;
      animation: float 2.5s ease-in-out infinite alternate;
    }

    @keyframes float {
      from { transform: translateY(0); }
      to { transform: translateY(-5px); }
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3);
      color: white;
      margin-bottom: 10px;
      outline: none;
    }

    input:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 1px var(--pink);
    }

    button {
      border-radius: 999px;
      border: none;
      padding: 10px 20px;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.7);
    }

    .result {
      margin-top: 16px;
      padding: 14px;
      border-radius: 18px;
      background: var(--card-bg);
      display: none;
    }

    .result.show {
      display: block;
    }

    .highlight {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--gold);
      margin-top: 6px;
      text-shadow: 0 0 14px rgba(251, 191, 36, 0.8);
    }

    .message {
      margin-top: 10px;
      font-size: 0.85rem;
    }

    .error {
      color: var(--error);
    }

    .footer {
      margin-top: 12px;
      font-size: 0.75rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="mask-emoji">🎭</div>
    <div class="title">Secret Pourim</div>
    <div class="subtitle">
      Qui vas-tu gâter cette année ?<br>
      Entre ton prénom et découvre ton tirage secret ✨
    </div>

    <input id="name-input" type="text" placeholder="Ton prénom..." autocomplete="off">
    <button onclick="draw()">🎁 Découvrir</button>

    <div id="result" class="result">
      <div id="result-text"></div>
      <div id="result-name" class="highlight"></div>
      <div class="message">
        Prépare un beau michloah manot, un déguisement surprise ou une petite attention festive 🎉
      </div>
    </div>

    <div id="error" class="message error"></div>

    <div class="footer">
      Secret Pourim 🤫 — ne montre pas l’écran !
    </div>
  </div>

  <script> const PAIRS = { 
  //Filles 
  sarah: "noa", noa: "tata", tata: "judith", judith: "tati", tati: "sarah", 
  // Garçons 
  shmuel: "papa", papa: "harry", harry: "tonton_daniel", tonton_daniel: "shmuel" };
    const DISPLAY = { shmuel: "Shmuel", sarah: "Sarah", papa: "Papa", tati: "Tati", tata: "Tata", judith: "Judith", noa: "Noa", guil: "Guil", harry: "Harry", daniel: "Daniel" };
    function draw()  {
      const input = document.getElementById("name-input").value.trim().toLowerCase();
      const resultBox = document.getElementById("result"); 
      const resultText = document.getElementById("result-text");
      const resultName = document.getElementById("result-name");
      const errorBox = document.getElementById("error");
      resultBox.classList.remove("show"); errorBox.textContent = "";
      if (!input) {
        errorBox.textContent = "Entre ton prénom avant de continuer."; 
        return;
      } 
      if (!PAIRS[input]) { 
        errorBox.textContent = "Prénom non reconnu. Vérifie l'orthographe."; 
        return; 
      }
      const target = PAIRS[input]; resultText.textContent = Chut... ${DISPLAY[input]} tu es tombé(e) sur :;
      resultName.textContent = DISPLAY[target];
  resultBox.classList.add("show"); } </script>

</body>
</html>
