<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tirage Mishloach Manot</title>

<style>
:root{
  --primary:#6a00f4;
  --bg1:#fff8f0;
  --bg2:#ffeef8;
}

body{
  margin:0;
  font-family: system-ui, -apple-system, sans-serif;
  background: linear-gradient(180deg,var(--bg1),var(--bg2));
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  padding:20px;
}

.card{
  width:100%;
  max-width:400px;
  background:white;
  padding:28px;
  border-radius:18px;
  box-shadow:0 12px 30px rgba(0,0,0,0.08);
  text-align:center;
}

h1{
  margin:0 0 20px 0;
  font-size:20px;
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #eee;
  font-size:16px;
  margin-bottom:15px;
  outline:none;
}

input:focus{
  border-color:var(--primary);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:var(--primary);
  color:white;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

button:active{
  transform:scale(0.98);
}

.result{
  margin-top:20px;
  font-size:18px;
  min-height:50px;
  font-weight:600;
}

.reveal{
  animation:pop 0.5s ease forwards;
}

@keyframes pop{
  0%{opacity:0;transform:scale(0.6);}
  100%{opacity:1;transform:scale(1);}
}

.spinner{
  margin-top:15px;
  font-size:22px;
  animation:spin 0.8s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="card">

  <h1>Tirage Mishloach Manot 🎭</h1>

  <input type="text" id="nameInput" placeholder="Entre ton prénom">

  <button onclick="draw()">Découvrir</button>

  <div id="spinner" class="spinner hidden">🎁</div>
  <div id="result" class="result"></div>

</div>

<script>

// 🔒 Mets ici tes vrais tuples plus tard
const pairs = {
  sarah: "noa",
  noa: "daniel",
  tata: "judith",
  judith: "tati",
  tati: "sarah",

  shmuel: "papa",
  papa: "harry",
  harry: "daniel",
  daniel: "shmuel"
};

function draw(){
  const name = document.getElementById("nameInput").value.trim().toLowerCase();
  const resultDiv = document.getElementById("result");
  const spinner = document.getElementById("spinner");

  resultDiv.innerHTML = "";
  spinner.classList.remove("hidden");

  setTimeout(() => {
    spinner.classList.add("hidden");

    if(pairs[name]){
      resultDiv.innerHTML = `
        Tu dois offrir à :
        <div class="reveal" style="margin-top:8px;font-size:22px;color:#6a00f4">
          ${pairs[name]}
        </div>
      `;
    } else {
      resultDiv.innerHTML = "Nom introuvable";
    }

  }, 1000);
}

</script>

</body>
</html>
